services:
  web:
    build:
      context: .
      dockerfile: ./ui/Dockerfile
    ports:
      - "80:8011"     # HTTP (redirect + ACME challenges)
      - "443:8443"    # HTTPS (main UI)
      - "8011:8011"   # HTTP alt (backward compat)
      - "8443:8443"   # HTTPS alt (backward compat)
    volumes:
      - letsencrypt:/etc/letsencrypt
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - BACKEND_URL=${BACKEND_URL:-http://backend:5000}
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-120}
      # Let's Encrypt (optional): set both to enable auto-HTTPS with real certs
      - LETSENCRYPT_DOMAIN=${LETSENCRYPT_DOMAIN:-}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL:-}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8011/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 128M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/run
      - /var/cache/nginx
      - /etc/nginx/ssl
      - /etc/nginx/conf.d
      - /var/www/certbot
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - frontend
    restart: unless-stopped

  waf:
    build: ./waf-go
    # Port 1344 (ICAP) is internal only — not exposed on the host
    volumes:
      - ./config:/config:ro
      - ./data:/data:ro
    environment:
      - BASIC_AUTH_USERNAME=${BASIC_AUTH_USERNAME}
      - BASIC_AUTH_PASSWORD=${BASIC_AUTH_PASSWORD}
      - WAF_BLOCK_THRESHOLD=${WAF_BLOCK_THRESHOLD:-10}
      # Heuristic engine toggles (1=on, 0=off)
      - WAF_H_ENTROPY=${WAF_H_ENTROPY:-1}
      - WAF_H_ENTROPY_MAX=${WAF_H_ENTROPY_MAX:-7.5}
      - WAF_H_BEACONING=${WAF_H_BEACONING:-1}
      - WAF_H_PII=${WAF_H_PII:-1}
      - WAF_H_SHARDING=${WAF_H_SHARDING:-1}
      - WAF_H_GHOSTING=${WAF_H_GHOSTING:-1}
      - WAF_H_SEQUENCE=${WAF_H_SEQUENCE:-0}
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - proxy-internal
    restart: unless-stopped

  backend:
    build: ./backend-go
    ports:
      - "127.0.0.1:5001:5000"  # Backend API — localhost only (WebSocket proxied via Nginx)
    volumes:
      - ./config:/config
      - ./data:/data
      - ./logs:/logs
    environment:
      - PROXY_HOST=${PROXY_HOST:-proxy}
      - PROXY_PORT=${PROXY_PORT:-3128}
      - PROXY_CONTAINER_NAME=${PROXY_CONTAINER_NAME:-secure-proxy-manager-proxy}
      - BASIC_AUTH_USERNAME=${BASIC_AUTH_USERNAME}
      - BASIC_AUTH_PASSWORD=${BASIC_AUTH_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://localhost:8443}
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M  # Go uses ~20MB vs Python 150MB+
    healthcheck:
      test: ["CMD", "/server", "-healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - frontend
      - proxy-internal
    restart: unless-stopped

  dns:
    build: ./dns
    volumes:
      - ./config:/config:ro
      - ./logs:/var/log
    environment:
      # Upstream DNS: default malware-blocking resolvers. Override with your own (e.g. Pi-hole)
      - DNS_UPSTREAM_1=${DNS_UPSTREAM_1:-1.1.1.3}
      - DNS_UPSTREAM_2=${DNS_UPSTREAM_2:-9.9.9.9}
      - DNS_UPSTREAM_3=${DNS_UPSTREAM_3:-8.8.8.8}
      # WPAD: set to your proxy's LAN IP for auto-proxy discovery
      - PROXY_IP=${PROXY_IP:-}
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    healthcheck:
      test: ["CMD", "nslookup", "localhost", "127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/run
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      # DAC_OVERRIDE: dnsmasq writes its query log to the shared ./logs mount,
      # which is owned by a different UID; with cap_drop: ALL even root needs this
      # to write there (see dns/entrypoint.sh).
      - DAC_OVERRIDE
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - proxy-internal
      # Egress: dnsmasq must reach the upstream resolvers (DNS_UPSTREAM_*).
      # proxy-internal is `internal: true` (no gateway), so without this the
      # dns container cannot forward queries and the proxy cannot resolve.
      - frontend
    restart: unless-stopped

  proxy:
    build: ./proxy
    container_name: secure-proxy-manager-proxy
    environment:
      - GUI_IP_WHITELIST=${GUI_IP_WHITELIST:-}
    ports:
      - "${PROXY_BIND_IP:-0.0.0.0}:3128:3128"
    volumes:
      - ./config:/config
      - ./data:/data:ro
      - ./logs:/var/log/squid
      - squid-cache:/var/spool/squid
    depends_on:
      waf:
        condition: service_healthy
      dns:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "(squidclient -h 127.0.0.1 -p 3128 mgr:info 2>/dev/null | grep -q 'Squid Object Cache') || curl -sf --max-time 3 -x http://127.0.0.1:3128 http://www.gstatic.com/generate_204 -o /dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/run
      - /var/log/supervisor
      - /etc/squid
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - proxy-internal
      # Egress: a forward proxy must reach the internet. proxy-internal is
      # `internal: true` (no gateway to the host/internet), so the proxy is
      # also attached to the egress-capable `frontend` network. Without this
      # every upstream fetch fails (HTTP 502 / CONNECT refused).
      - frontend
    restart: unless-stopped
    # GUARDRAIL: the proxy intentionally has NO `cap_drop: ALL`. It relies on the
    # default capability set — CHOWN, SETUID/SETGID, DAC_OVERRIDE — for
    # startup.sh (chown /config/ssl_db and the shared ./logs mount, `su - proxy`)
    # and for squid's privilege drop + log_file_daemon writing to ./logs (owned
    # by a different host UID). Adding `cap_drop: ALL` here without granting those
    # back WILL break the data plane — the same class as the 3.10.4/3.10.5 dns
    # CAP_DAC_OVERRIDE bug, but threefold. NET_ADMIN is for the transparent-proxy
    # iptables REDIRECT rules.
    cap_add:
      - NET_ADMIN

  # Optional Tailscale sidecar for secure remote access
  tailscale:
    build: ./overlay/tailscale
    hostname: ${TAILSCALE_HOSTNAME:-secure-proxy}
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:-}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=--advertise-tags=tag:proxy
    volumes:
      - tailscale-data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - proxy-internal
    restart: unless-stopped
    profiles:
      - tailscale

  # ── Observability stack (opt-in) ───────────────────────────────────────────
  # Enable with:  docker compose --profile observability up -d
  # Prometheus scrapes backend:5000/metrics and waf:8080/metrics on the internal
  # network; Grafana is published on localhost only.
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: secure-proxy-manager-prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - proxy-internal
      - frontend
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles:
      - observability

  grafana:
    image: grafana/grafana:11.4.0
    container_name: secure-proxy-manager-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    networks:
      - frontend
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles:
      - observability

networks:
  frontend:
    driver: bridge
  proxy-internal:
    driver: bridge
    internal: true

volumes:
  squid-cache:
    driver: local
  tailscale-data:
    driver: local
  letsencrypt:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local