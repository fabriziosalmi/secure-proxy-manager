services:
  web:
    build:
      context: .
      dockerfile: ./ui/Dockerfile
    ports:
      - "8011:8011"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - BACKEND_URL=${BACKEND_URL:-http://backend:5000}
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-120}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8011/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
    networks:
      - proxy-network
    restart: unless-stopped

  waf:
    build: ./waf-go
    # Port 1344 (ICAP) is internal only — not exposed on the host
    volumes:
      - ./config:/config
      - ./data:/data
    environment:
      - BASIC_AUTH_USERNAME=${BASIC_AUTH_USERNAME}
      - BASIC_AUTH_PASSWORD=${BASIC_AUTH_PASSWORD}
      - WAF_BLOCK_THRESHOLD=${WAF_BLOCK_THRESHOLD:-10}
      # Heuristic engine toggles (1=on, 0=off)
      - WAF_H_ENTROPY=${WAF_H_ENTROPY:-1}
      - WAF_H_ENTROPY_MAX=${WAF_H_ENTROPY_MAX:-7.5}
      - WAF_H_BEACONING=${WAF_H_BEACONING:-1}
      - WAF_H_PII=${WAF_H_PII:-1}
      - WAF_H_SHARDING=${WAF_H_SHARDING:-1}
      - WAF_H_MORPHING=${WAF_H_MORPHING:-0}
      - WAF_H_GHOSTING=${WAF_H_GHOSTING:-1}
      - WAF_H_SEQUENCE=${WAF_H_SEQUENCE:-0}
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - proxy-network
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "5001:5000"  # LAN-accessible: browser WebSocket (logs page) connects here directly.
                     # Restrict with firewall rules if internet-facing (e.g. ufw deny 5001).
    volumes:
      - ./config:/config
      - ./data:/data
      - ./logs:/logs
    environment:
      - PROXY_HOST=${PROXY_HOST:-proxy}
      - PROXY_PORT=${PROXY_PORT:-3128}
      - PROXY_CONTAINER_NAME=${PROXY_CONTAINER_NAME:-secure-proxy-manager-proxy-1}
      - BASIC_AUTH_USERNAME=${BASIC_AUTH_USERNAME}
      - BASIC_AUTH_PASSWORD=${BASIC_AUTH_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:8011}
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - proxy-network
    restart: unless-stopped

  dns:
    build: ./dns
    volumes:
      - ./config:/config:ro
    environment:
      # Upstream DNS: default malware-blocking resolvers. Override with your own (e.g. Pi-hole)
      - DNS_UPSTREAM_1=${DNS_UPSTREAM_1:-1.1.1.3}
      - DNS_UPSTREAM_2=${DNS_UPSTREAM_2:-9.9.9.9}
      - DNS_UPSTREAM_3=${DNS_UPSTREAM_3:-8.8.8.8}
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
    healthcheck:
      test: ["CMD", "nslookup", "localhost", "127.0.0.1"]
      interval: 10s
      timeout: 2s
      retries: 3
      start_period: 3s
    networks:
      - proxy-network
    restart: unless-stopped

  proxy:
    build: ./proxy
    container_name: secure-proxy-manager-proxy
    ports:
      - "3128:3128"
    volumes:
      - ./config:/config
      - ./data:/data
      - ./logs:/var/log/squid
      - squid-cache:/var/spool/squid
    depends_on:
      waf:
        condition: service_healthy
      dns:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    networks:
      - proxy-network
    restart: unless-stopped
    cap_add:
      - NET_ADMIN

  # Optional Tailscale sidecar for secure remote access
  tailscale:
    build: ./overlay/tailscale
    hostname: ${TAILSCALE_HOSTNAME:-secure-proxy}
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:-}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=--advertise-tags=tag:proxy
    volumes:
      - tailscale-data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - proxy-network
    restart: unless-stopped
    profiles:
      - tailscale

networks:
  proxy-network:
    driver: bridge

volumes:
  squid-cache:
    driver: local
  tailscale-data:
    driver: local