server {
    listen 8080;
    server_tokens off;
    root /usr/share/nginx/html;

    location /ip-list.txt {
        default_type text/plain;
    }

    location /domain-list.txt {
        default_type text/plain;
    }

    location = /health {
        access_log off;
        return 200 'ok';
    }
}
