# Secure Proxy Manager — Internal DNS resolver for domain blackhole
# This dnsmasq instance is used ONLY by Squid internally.
# Clients never interact with it directly.

# Listen on all interfaces inside Docker network
listen-address=0.0.0.0
bind-interfaces

# Upstream DNS (public resolvers)
server=8.8.8.8
server=1.1.1.1
server=8.8.4.4

# Cache size (domains cached in memory)
cache-size=10000

# Never forward plain hostnames (security)
domain-needed
bogus-priv

# Log queries for debugging (comment out in production)
# log-queries

# Include the auto-generated blocklist (created by backend on first reload)
# Use conf-dir with wildcard so dnsmasq starts even if file doesn't exist yet
conf-dir=/config/dnsmasq.d/,*.conf
