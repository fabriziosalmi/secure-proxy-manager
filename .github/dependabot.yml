version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/ui"
    schedule:
      interval: "weekly"
    groups:
      ui-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "gomod"
    directory: "/backend-go"
    schedule:
      interval: "weekly"
    groups:
      backend-go-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "gomod"
    directory: "/waf-go"
    schedule:
      interval: "weekly"
    groups:
      waf-go-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      docker-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: "weekly"
    groups:
      docs-dependencies:
        patterns:
          - "*"

  # Keep the SHA-pinned GitHub Actions (ci.yml, multi-arch.yml, docs.yml)
  # patched — pinning to a digest means we don't get upstream fixes otherwise.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions-dependencies:
        patterns:
          - "*"
