name: Multi-Arch Build & Push

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # OIDC token for cosign keyless signing
    strategy:
      matrix:
        include:
          - image: web
            context: .
            dockerfile: ./ui/Dockerfile
          - image: backend
            context: ./backend-go
            dockerfile: ./backend-go/Dockerfile
          - image: waf
            context: ./waf-go
            dockerfile: ./waf-go/Dockerfile
          - image: proxy
            context: ./proxy
            dockerfile: ./proxy/Dockerfile
          - image: dns
            context: ./dns
            dockerfile: ./dns/Dockerfile

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up QEMU (for ARM64 emulation)
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push ${{ matrix.image }}
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Attach an SBOM and SLSA build provenance attestation to each image so
          # consumers can audit contents and verify the build origin.
          sbom: true
          provenance: mode=max

      # Keyless (OIDC) signature via cosign, so consumers can verify the image
      # provenance against this repo's identity. Best-effort for now
      # (continue-on-error) so a signing hiccup never blocks the image publish;
      # promote to required once verified on a real release tag.
      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Sign the published image (keyless)
        if: startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
