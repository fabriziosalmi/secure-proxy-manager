name: Multi-Arch Build & Push

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # OIDC token for cosign keyless signing
    strategy:
      matrix:
        include:
          - image: web
            context: .
            dockerfile: ./ui/Dockerfile
          - image: backend
            context: ./backend-go
            dockerfile: ./backend-go/Dockerfile
          - image: waf
            context: ./waf-go
            dockerfile: ./waf-go/Dockerfile
          - image: proxy
            context: ./proxy
            dockerfile: ./proxy/Dockerfile
          - image: dns
            context: ./dns
            dockerfile: ./dns/Dockerfile

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU (for ARM64 emulation)
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push ${{ matrix.image }}
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Busts the proxy image's apt layer every run so a cached layer can
          # never reinstall an unpatched squid (the proxy Dockerfile also fails
          # closed if squid is older than its CVE floor). Ignored by images whose
          # Dockerfile does not declare APT_REFRESH.
          build-args: |
            APT_REFRESH=${{ github.run_id }}-${{ github.run_attempt }}
          # Attach an SBOM and SLSA build provenance attestation to each image so
          # consumers can audit contents and verify the build origin.
          sbom: true
          provenance: mode=max

      # Keyless (OIDC) signature via cosign, so consumers can verify the image
      # provenance against this repo's identity. Best-effort for now
      # (continue-on-error) so a signing hiccup never blocks the image publish;
      # promote to required once verified on a real release tag.
      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign the published image (keyless)
        if: startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
