name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── 1. TypeScript build ──────────────────────────────────────────────────
  build-ui:
    name: UI TypeScript build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
        working-directory: ui
      - run: npm run build
        working-directory: ui
      - run: npm test
        working-directory: ui

  # ── 2. Go backend build ────────────────────────────────────────────────
  build-backend:
    name: Go backend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.24'
          cache-dependency-path: backend-go/go.sum
      - run: go build -v ./...
        working-directory: backend-go

  # ── 3. Go WAF build ───────────────────────────────────────────────────
  build-waf:
    name: Go WAF build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.24'
          cache-dependency-path: waf-go/go.sum
      - run: go build -v ./...
        working-directory: waf-go

  # ── 4. Go backend tests ──────────────────────────────────────────────
  test-backend:
    name: Backend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.24'
          cache-dependency-path: backend-go/go.sum
      - run: go test -v -race -count=1 -coverprofile=coverage.out ./...
        working-directory: backend-go
      - name: Check coverage threshold
        working-directory: backend-go
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Backend coverage: ${COVERAGE}%"
          # Fail if coverage drops below 60%
          awk "BEGIN {exit ($COVERAGE < 60) ? 1 : 0}"

  # ── 5. Go WAF tests ───────────────────────────────────────────────────
  test-waf:
    name: WAF unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.24'
          cache-dependency-path: waf-go/go.sum
      - run: go test -v -race -count=1 ./...
        working-directory: waf-go

  # ── 6. Security scanning (gosec) ─────────────────────────────────────
  security-scan:
    name: Security scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.24'
          cache-dependency-path: backend-go/go.sum

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.22.4

      - name: Run gosec on backend-go
        working-directory: backend-go
        run: gosec -severity medium -confidence medium -exclude=G104 ./...

      - name: Run gosec on waf-go
        working-directory: waf-go
        run: gosec -severity medium -confidence medium -exclude=G104,G114,G301,G302,G304,G704 ./...

      - name: npm audit (UI)
        working-directory: ui
        run: |
          npm ci
          npm audit --audit-level=critical

  # ── 7. Docker build verification ──────────────────────────────────────
  docker-build:
    name: Docker build (all images)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Build all images
        run: docker compose build web backend waf proxy dns

  # ── 8. Popular list URL health check ──────────────────────────────────
  check-urls:
    name: Verify popular list URLs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Check all popular list URLs return 200
        run: |
          set -e
          FAILED=0
          check_url() {
            local name="$1" url="$2"
            local code
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 \
              -H "User-Agent: SecureProxyManager/CI" "$url")
            if [ "$code" = "200" ]; then
              echo "OK   [$code] $name"
            else
              echo "FAIL [$code] $name — $url"
              FAILED=1
            fi
          }
          check_url "Firehol Level 1"   "https://raw.githubusercontent.com/firehol/blocklist-ipsets/master/firehol_level1.netset"
          check_url "Spamhaus DROP"      "https://www.spamhaus.org/drop/drop.txt"
          check_url "StevenBlack hosts"  "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
          check_url "URLhaus domains"    "https://urlhaus.abuse.ch/downloads/hostfile/"
          [ "$FAILED" -ne 0 ] && exit 1 || true
