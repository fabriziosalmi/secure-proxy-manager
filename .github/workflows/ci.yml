name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. TypeScript build ──────────────────────────────────────────────────
  build-ui:
    name: UI TypeScript build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
        working-directory: ui
      - run: npm run build
        working-directory: ui

  # ── 2. Backend unit tests ────────────────────────────────────────────────
  test-backend:
    name: Backend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-mock httpx
      - name: Run unit tests
        env:
          BASIC_AUTH_USERNAME: testuser
          BASIC_AUTH_PASSWORD: testpass
          DATABASE_PATH: ":memory:"
        run: pytest tests/test_imports.py -v --tb=short

  # ── 3. Backend lint ──────────────────────────────────────────────────────
  lint-backend:
    name: Backend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check backend/app/ --select E,F,W --ignore E501

  # ── 4. Docker build verification ────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build all images
        run: |
          docker compose build backend web waf proxy

  # ── 5. Popular list URL health check ────────────────────────────────────
  check-urls:
    name: Verify popular list URLs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all popular list URLs return 200
        run: |
          set -e
          FAILED=0
          check_url() {
            local name="$1"
            local url="$2"
            local code
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 \
              -H "User-Agent: SecureProxyManager/CI" "$url")
            if [ "$code" = "200" ]; then
              echo "OK   [$code] $name"
            else
              echo "FAIL [$code] $name — $url"
              FAILED=1
            fi
          }

          # IP lists
          check_url "Firehol Level 1"        "https://raw.githubusercontent.com/firehol/blocklist-ipsets/master/firehol_level1.netset"
          check_url "Spamhaus DROP"           "https://www.spamhaus.org/drop/drop.txt"
          check_url "Emerging Threats"        "https://rules.emergingthreats.net/fwrules/emerging-Block-IPs.txt"
          check_url "CINS Army List"          "https://cinsarmy.com/list/ci-badguys.txt"

          # Domain lists
          check_url "StevenBlack hosts"       "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
          check_url "URLhaus domains"         "https://urlhaus.abuse.ch/downloads/hostfile/"
          check_url "Phishing Army"           "https://phishing.army/download/phishing_army_blocklist_extended.txt"

          if [ "$FAILED" -ne 0 ]; then
            echo ""
            echo "One or more list URLs are unreachable. Update Blacklists.tsx before merging."
            exit 1
          fi
