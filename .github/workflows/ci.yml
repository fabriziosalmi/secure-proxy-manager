name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── 1. TypeScript build ──────────────────────────────────────────────────
  build-ui:
    name: UI TypeScript build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
        working-directory: ui
      - run: npm run lint
        working-directory: ui
      - run: npm run build
        working-directory: ui
      - run: npm test
        working-directory: ui

  # ── 1b. Version sync ──────────────────────────────────────────────────
  # Fail the build if the version drifts across version.go / package.json /
  # package-lock.json / CHANGELOG (package-lock lagged at 3.10.2 until 3.10.5).
  version-sync:
    name: Version sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: bash scripts/check-version-sync.sh

  # ── 2. Go backend build ────────────────────────────────────────────────
  build-backend:
    name: Go backend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26'
          cache-dependency-path: backend-go/go.sum
      - run: go build -v ./...
        working-directory: backend-go
      - run: go vet ./...
        working-directory: backend-go

  # ── 3. Go WAF build ───────────────────────────────────────────────────
  build-waf:
    name: Go WAF build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26'
          cache-dependency-path: waf-go/go.sum
      - run: go build -v ./...
        working-directory: waf-go
      - run: go vet ./...
        working-directory: waf-go

  # ── 4. Go backend tests ──────────────────────────────────────────────
  test-backend:
    name: Backend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26'
          cache-dependency-path: backend-go/go.sum
      - run: go test -v -race -count=1 -coverprofile=coverage.out ./...
        working-directory: backend-go
      - name: Check coverage threshold
        working-directory: backend-go
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Backend coverage: ${COVERAGE}%"
          # Fail if coverage drops below 60%
          awk "BEGIN {exit ($COVERAGE < 60) ? 1 : 0}"

  # ── 5. Go WAF tests ───────────────────────────────────────────────────
  test-waf:
    name: WAF unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26'
          cache-dependency-path: waf-go/go.sum
      - run: go test -v -race -count=1 ./...
        working-directory: waf-go

  # ── 6. Security scanning (gosec) ─────────────────────────────────────
  security-scan:
    name: Security scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26'
          cache-dependency-path: backend-go/go.sum

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.22.4

      - name: Run gosec on backend-go
        working-directory: backend-go
        run: gosec -severity medium -confidence medium -exclude=G104 ./...

      - name: Run gosec on waf-go
        working-directory: waf-go
        run: gosec -severity medium -confidence medium -exclude=G104,G114,G301,G302,G304 ./...

      # govulncheck complements gosec (a SAST linter) with the Go vulnerability
      # database: it flags known-CVE dependencies AND stdlib issues, but only when
      # the vulnerable symbol is actually reachable. Reported (continue-on-error)
      # rather than gated, because stdlib advisories track the Go toolchain patch
      # level and would otherwise red-fail unrelated PRs on every disclosure until
      # the toolchain is bumped (handled by the github-actions/gomod Dependabot).
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck on backend-go
        working-directory: backend-go
        continue-on-error: true
        run: govulncheck ./...

      - name: Run govulncheck on waf-go
        working-directory: waf-go
        continue-on-error: true
        run: govulncheck ./...

      - name: npm audit (UI)
        working-directory: ui
        run: |
          npm ci
          # Gate on HIGH (not just critical): the react-router CVE wave that
          # shipped in v3.4.5 (GHSA turbo-stream RCE + 2 XSS) was rated HIGH and
          # silently passed a critical-only gate. Moderate is intentionally not
          # gated (current brace-expansion devDep advisory has no clean fix).
          npm audit --audit-level=high

  # ── 6b. Trivy filesystem CVE + misconfiguration scan ──────────────────
  # Catches vulnerable OS/library packages and IaC misconfigurations that gosec
  # (Go SAST) and npm audit (JS deps) do not. Installed as a pinned binary
  # rather than an unpinned action, matching this repo's supply-chain posture.
  # Gates only on FIXABLE high/critical findings (--ignore-unfixed) to stay
  # actionable.
  trivy-scan:
    name: Trivy CVE scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Trivy
        run: |
          # Download the pinned release binary directly — the upstream install.sh
          # is flaky in CI (exits 1 after resolving the version).
          VER=0.69.3
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${VER}/trivy_${VER}_Linux-64bit.tar.gz" -o /tmp/trivy.tgz
          tar -xzf /tmp/trivy.tgz -C /tmp trivy
          sudo install -m 0755 /tmp/trivy /usr/local/bin/trivy
          trivy --version
      - name: Scan dependencies for fixable high/critical CVEs
        run: |
          trivy fs --scanners vuln \
            --severity HIGH,CRITICAL --ignore-unfixed \
            --exit-code 1 --no-progress .
      - name: Report IaC misconfigurations (non-gating)
        run: |
          trivy fs --scanners misconfig \
            --severity HIGH,CRITICAL --exit-code 0 --no-progress .

  # ── 7. Docker build verification ──────────────────────────────────────
  docker-build:
    name: Docker build (all images)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build all images
        run: docker compose build web backend waf proxy dns

  # ── 8. Popular list URL health check ──────────────────────────────────
  check-urls:
    name: Verify popular list URLs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check all popular list URLs return 200
        run: |
          set -e
          FAILED=0
          check_url() {
            local name="$1" url="$2"
            local code
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 \
              -H "User-Agent: SecureProxyManager/CI" "$url")
            if [ "$code" = "200" ]; then
              echo "OK   [$code] $name"
            else
              echo "FAIL [$code] $name — $url"
              FAILED=1
            fi
          }
          check_url "Firehol Level 1"   "https://raw.githubusercontent.com/firehol/blocklist-ipsets/master/firehol_level1.netset"
          check_url "Spamhaus DROP"      "https://www.spamhaus.org/drop/drop.txt"
          check_url "StevenBlack hosts"  "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
          check_url "URLhaus domains"    "https://urlhaus.abuse.ch/downloads/hostfile/"
          [ "$FAILED" -ne 0 ] && exit 1 || true

  # ── 8b. Compose validation (incl. the prod file users actually run) ───
  # deploy/docker-compose.prod.yml is what deploy/install.sh copies into place on
  # every real install, yet nothing else in CI ever parses it — so a YAML /
  # interpolation / schema error (or a security key applied to only one of the
  # two hand-maintained files, like the dns CAP_DAC_OVERRIDE fix) ships unnoticed.
  # `config -q` resolves and validates both files.
  validate-compose:
    name: Validate compose files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate dev compose
        run: docker compose -f docker-compose.yml config -q
      - name: Validate prod compose
        run: docker compose -f deploy/docker-compose.prod.yml config -q

  # ── 9. End-to-end smoke (compose up + core path) ──────────────────────
  # Builds and RUNS the whole stack, then exercises the core path: service
  # health, proxy egress, live blacklist blocking, the Squid→backend log
  # pipeline, and the audit log. This is the check that would have caught the
  # fresh-deploy breakage that the build-only jobs above let through.
  e2e:
    name: E2E (compose up + smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Compose up + core smoke
        run: bash tests/ci-e2e.sh

  # ── 10. End-to-end UI/API (Playwright) ────────────────────────────────
  # Runs the maintained Playwright suite (tests/e2e/selfhoster.spec.ts) against
  # the test stack (backend + web + mock-lists) via docker-compose.test.yml.
  # The suite is green (59/59); 1 retry tolerates the occasional flake from the
  # serial / shared-DB design. (To make it a hard merge gate, also add
  # "E2E UI (Playwright)" to the branch's required status checks.)
  e2e-ui:
    name: E2E UI (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Playwright e2e (test compose)
        env:
          TEST_USERNAME: testadmin
          TEST_PASSWORD: TestP@ss123!
        run: |
          docker compose -f docker-compose.test.yml up --build \
            --abort-on-container-exit --exit-code-from test-runner
      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
